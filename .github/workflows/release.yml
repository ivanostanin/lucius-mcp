name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.tag_version }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0  # Fetch all history for all branches and tags

      - name: Verify tag is on main branch
        run: |
          # Check if the tagged commit is reachable from main
          if ! git merge-base --is-ancestor ${{ github.sha }} origin/main; then
            echo "ERROR: Tag must point to a commit on the main branch"
            exit 1
          fi

      - name: Extract version from tag
        id: get_version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT
      
      - name: Validate version matches pyproject.toml
        run: |
          PROJECT_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          TAG_VERSION=${{ steps.get_version.outputs.tag_version }}
          
          if [ "$PROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Version mismatch!"
            echo "Tag version: $TAG_VERSION"
            echo "pyproject.toml version: $PROJECT_VERSION"
            exit 1
          fi

  python-quality:
    needs: validate-version
    permissions:
      contents: read
    uses: ./.github/workflows/_python_check.yml
    with:
      python-version: ${{ vars.PYTHON_VERSION }}

  mcpb-build:
    needs: [validate-version, python-quality]
    permissions:
      contents: read
    uses: ./.github/workflows/_mcpb_build.yml
    with:
      version: ${{ needs.validate-version.outputs.version }}
      artifact-name: mcpb-bundle-${{ needs.validate-version.outputs.version }}

  cli-build:
    if: ${{ vars.FEATURE_CLI == 'true' }}
    needs: validate-version
    permissions:
      contents: read
    uses: ./.github/workflows/_cli_build_test.yml
    with:
      python-version: ${{ vars.PYTHON_VERSION }}

  docker-build:
    needs: [python-quality, validate-version]
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_docker_build_push.yml
    with:
      image-name: lucius-mcp
      tags: |
        ${{ needs.validate-version.outputs.version }}
        latest
      labels: |
        org.opencontainers.image.source=https://github.com/${{ github.repository }}
        org.opencontainers.image.description=Release ${{ needs.validate-version.outputs.version }}
      push: true

  github-release:
    needs: [validate-version, mcpb-build, cli-build]
    if: ${{ always() && needs.validate-version.result == 'success' && needs.mcpb-build.result == 'success' && (needs.cli-build.result == 'success' || needs.cli-build.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Download MCPB artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: mcpb-bundle-${{ needs.validate-version.outputs.version }}
          path: dist/

      - name: Validate MCPB artifacts exist
        run: |
          shopt -s nullglob
          files=(dist/*.mcpb)
          if [ ${#files[@]} -eq 0 ]; then
            echo "ERROR: No MCPB artifacts found in dist/"
            exit 1
          fi

      - name: Create MCPB checksum manifest
        run: |
          cd dist
          sha256sum *.mcpb > MCPB_SHA256SUMS

      - name: Download CLI artifacts
        if: ${{ vars.FEATURE_CLI == 'true' }}
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: lucius-*
          path: dist/cli/
          merge-multiple: true

      - name: Setup Python and dependencies
        uses: ./.github/actions/setup-python
        with:
          python-version: ${{ vars.PYTHON_VERSION }}

      - name: Validate full release artifact set
        if: ${{ vars.FEATURE_CLI == 'true' }}
        env:
          REQUIRE_ALL_CLI_BINARIES: "1"
        run: |
          uv run --python ${{ vars.PYTHON_VERSION }} pytest tests/packaging/test_cli_binaries.py::TestBinaryPresence::test_all_platform_binaries_exist -v --tb=short

      - name: Create checksums
        if: ${{ vars.FEATURE_CLI == 'true' }}
        run: |
          cd dist/cli
          for file in lucius-*; do
            if [ -f "$file" ]; then
              sha256sum "$file" > "$file.sha256"
            fi
          done
          cat *.sha256 > SHA256SUMS

      - name: Get Changelog Entry
        id: changelog_reader
        uses: mindsers/changelog-reader-action@v2.2.3
        with:
          version: ${{ github.ref_name }}
          path: ./CHANGELOG.md

      - name: Create GitHub Release (with CLI artifacts)
        if: ${{ vars.FEATURE_CLI == 'true' }}
        uses: softprops/action-gh-release@v2.6.1
        with:
          body: ${{ steps.changelog_reader.outputs.changes }}
          fail_on_unmatched_files: true
          files: |
            dist/*.mcpb
            dist/MCPB_SHA256SUMS
            dist/cli/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (MCPB only)
        if: ${{ vars.FEATURE_CLI != 'true' }}
        uses: softprops/action-gh-release@v2.6.1
        with:
          body: ${{ steps.changelog_reader.outputs.changes }}
          fail_on_unmatched_files: true
          files: |
            dist/*.mcpb
            dist/MCPB_SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pages:
    needs: python-quality
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/_pages_build_deploy.yml

  pypi-publish:
    needs: python-quality
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python Environment
        uses: ./.github/actions/python-setup

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
