name: CLI Build and Test

on:
  pull_request:
    paths:
      - 'src/cli/**'
      - 'tests/cli/**'
      - 'deployment/scripts/**'
      - '.github/actions/setup-lucius-python/**'
      - '.github/workflows/cli-build.yml'
      - '.github/workflows/_cli_build_test.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cli-build:
    permissions:
      contents: read
    uses: ./.github/workflows/_cli_build_test.yml
    with:
      python-version: '3.13'
