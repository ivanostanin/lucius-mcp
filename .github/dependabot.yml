    reviewers:
      - "ivanostanin"

  - package-ecosystem: "docker"
    directory: "/deployment"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels: ["dependencies", "docker"]
    reviewers:
      - "ivanostanin"
