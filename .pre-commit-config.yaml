repos:
  - repo: local
    hooks:
      - id: sync-mcp-manifest-on-tools-change
        name: sync-mcp-manifest-on-tools-change
        entry: scripts/pre_commit_sync_mcp_manifest.sh
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format .
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-check
        name: ruff-check
        entry: uv run ruff check --fix .
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run mypy src
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: uv run pytest tests/unit tests/integration tests/docs tests/packaging --ignore=tests/packaging/test_cli_binaries.py
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
